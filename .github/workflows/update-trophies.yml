name: Auto Update GitHub Trophy Stats
on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  update-trophies:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Wake up Render service
        run: |
          # First ping — wake up the server
          curl -s --max-time 120 --retry 3 --retry-delay 15 \
            "https://github-stats-deployment.onrender.com/health" || true
          
          # Wait for full warm-up
          sleep 30

      - name: Hit all endpoints to cache data
        run: |
          curl -s --max-time 120 \
            "https://github-stats-deployment.onrender.com/stats?username=jarif87&theme=midnight" || true
          curl -s --max-time 120 \
            "https://github-stats-deployment.onrender.com/trophies?username=jarif87&columns=6&theme=midnight" || true
          curl -s --max-time 120 \
            "https://github-stats-deployment.onrender.com/languages?username=jarif87&theme=midnight&top=10" || true

      - name: Update trophy URL version
        run: |
          TIMESTAMP=$(date +%s)
          sed -i "s/v=[0-9]*/v=${TIMESTAMP}/g" README.md

      - name: Check if changes exist
        id: verify_diff
        run: |
          git diff --quiet . || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push if changed
        if: steps.verify_diff.outputs.changed == 'true'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add README.md
          git commit -m "Auto-update trophy stats timestamp"
          git push
