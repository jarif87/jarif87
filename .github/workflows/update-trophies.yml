name: Auto Update GitHub Trophy Stats
on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

concurrency:
  group: trophy-update
  cancel-in-progress: false

jobs:
  update-trophies:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Wake up Render service
        id: wake
        run: |
          MAX_ATTEMPTS=12
          BASE_SLEEP=15
          SUCCESS=false
          for i in $(seq 1 $MAX_ATTEMPTS); do
            HTTP=$(curl -s -o /dev/null -w "%{http_code}" \
              --max-time 90 --connect-timeout 30 \
              "https://github-stats-deployment.onrender.com/health")
            echo "Attempt $i/$MAX_ATTEMPTS: HTTP $HTTP"
            if [ "$HTTP" = "200" ]; then
              echo "Server is live"
              SUCCESS=true
              break
            fi
            WAIT=$(( BASE_SLEEP * i ))
            WAIT=$(( WAIT > 60 ? 60 : WAIT ))
            echo "Sleeping ${WAIT}s..."
            sleep $WAIT
          done
          if [ "$SUCCESS" != "true" ]; then
            echo "Server did not wake after $MAX_ATTEMPTS attempts"
            exit 1
          fi

      - name: Verify all endpoints return valid SVG
        run: |
          BASE="https://github-stats-deployment.onrender.com"
          USER="jarif87"
          FAILED=0

          check_endpoint() {
            local name=$1
            local url=$2
            for i in 1 2 3 4 5; do
              RESP=$(curl -s --max-time 90 --connect-timeout 30 "$url")
              if echo "$RESP" | grep -q "<svg"; then
                echo "OK: $name"
                return 0
              fi
              echo "RETRY $i: $name not ready"
              sleep $(( i * 10 ))
            done
            echo "FAILED: $name"
            return 1
          }

          check_endpoint "stats" "$BASE/stats?username=$USER&theme=midnight" || FAILED=1
          check_endpoint "trophies" "$BASE/trophies?username=$USER&columns=6&theme=midnight" || FAILED=1
          check_endpoint "languages" "$BASE/languages?username=$USER&theme=midnight&top=10" || FAILED=1

          if [ "$FAILED" = "1" ]; then
            exit 1
          fi

      - name: Update README timestamp
        run: |
          TIMESTAMP=$(date +%s)
          if ! grep -q "v=[0-9]" README.md; then
            exit 0
          fi
          sed -i "s/v=[0-9]*/v=${TIMESTAMP}/g" README.md

      - name: Commit and push if changed
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add README.md
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: auto-update trophy stats [skip ci]"
            git push
          fi
