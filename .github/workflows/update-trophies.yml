- name: Wake up Render service
  run: |
    for i in 1 2 3 4 5; do
      RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 \
        "https://github-stats-deployment.onrender.com/health")
      echo "Attempt $i: HTTP $RESPONSE"
      if [ "$RESPONSE" = "200" ]; then
        echo "Server is warm!"
        break
      fi
      sleep 20
    done

- name: Pre-warm all endpoints (wait for actual data)
  run: |
    for i in 1 2 3; do
      STATS=$(curl -s --max-time 60 \
        "https://github-stats-deployment.onrender.com/stats?username=jarif87&theme=midnight")
      if echo "$STATS" | grep -q "<svg"; then
        echo "Stats endpoint warm ✓"
        break
      fi
      echo "Stats not ready, retrying in 15s..."
      sleep 15
    done

    for i in 1 2 3; do
      TROPHY=$(curl -s --max-time 60 \
        "https://github-stats-deployment.onrender.com/trophies?username=jarif87&columns=6&theme=midnight")
      if echo "$TROPHY" | grep -q "<svg"; then
        echo "Trophies endpoint warm ✓"
        break
      fi
      echo "Trophies not ready, retrying in 15s..."
      sleep 15
    done

    for i in 1 2 3; do
      LANG=$(curl -s --max-time 60 \
        "https://github-stats-deployment.onrender.com/languages?username=jarif87&theme=midnight&top=10")
      if echo "$LANG" | grep -q "<svg"; then
        echo "Languages endpoint warm ✓"
        break
      fi
      echo "Languages not ready, retrying in 15s..."
      sleep 15
    done

    sleep 10
